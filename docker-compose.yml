version: '3.8'

services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      SA_PASSWORD: "Ahmed@123"
      ACCEPT_EULA: "Y"
    ports:
      - "11434:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'Ahmed@123' -Q 'SELECT 1' -No -C || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: ahmedelkassas17/taskmanagement-api:latest
    depends_on:
      - sqlserver
      - redis
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: "Server=sqlserver;Database=TaskManagementDb;User Id=sa;Password=Ahmed@123;TrustServerCertificate=True"
      Redis__ConnectionString: "redis:6379"
      Jwt__Key: "NM62PjFNTxaP1VEWoLdsMLE7lxiIcMDZ5paxFelARQv1234567890ABCDEF"
      Jwt__Issuer: "TaskManagement"
      Jwt__Audience: "TaskManagementUsers"
      Jwt__ExpiryMinutes: "1"
      RefreshToken__ExpiryDays: "7"
    ports:
      - "5000:8080"
    volumes:
      - dataprotection_keys:/root/.aspnet/DataProtection-Keys 

volumes:
  sqlserver_data:
  dataprotection_keys: